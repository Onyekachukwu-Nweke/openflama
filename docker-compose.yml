version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: openflama
      POSTGRES_PASSWORD: openflama
      POSTGRES_DB: openflama
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
